[countdown]
# Path to your countdown audio file (absolute or relative to this directory)
audio_file = countdown.mp3

# Duration of the audio in seconds — the countdown starts this many seconds
# before the meeting so it ends right as the meeting begins
duration = 34

# How often (in seconds) to poll macOS Calendar for upcoming meetings
poll_interval = 15

# Calendar account to filter (e.g. you@gmail.com). Leave blank to check all calendars.
calendar_account =
